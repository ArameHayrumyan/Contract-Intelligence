[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rag_core"
version = "2.0.0"
description = "Tenant-scoped contract intelligence & SLA auditing RAG core."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Secure Contract Intelligence" }]
license = { text = "Proprietary" }

dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "tenacity>=8.2",
    # Document processing
    "pdfplumber>=0.11",
    "pytesseract>=0.3.10",
    "opencv-python-headless>=4.9",
    "Pillow>=10.2",
    "pypdf>=4.2",
    "python-magic-bin>=0.4.14; platform_system == 'Windows'",
    "python-magic>=0.4.27; platform_system != 'Windows'",
    # Chunking / embeddings / vector store
    "langchain-text-splitters>=0.2",
    "chromadb>=0.5",
    "sentence-transformers>=2.7",
    # LLM providers (interfaces resolved at runtime via factory)
    "langchain-core>=0.2",
    "langchain-openai>=0.1",
    "langchain-anthropic>=0.1",
    "langchain-groq>=0.1",
    "langchain-google-genai>=1.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "types-Pillow",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["rag_core*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["B008"]  # FastAPI dependency-injection idiom uses calls in defaults.

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["../../tests"]
