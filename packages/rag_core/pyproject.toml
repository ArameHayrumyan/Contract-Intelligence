[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rag_core"
version = "2.0.0"
description = "Tenant-scoped contract intelligence & SLA auditing RAG core."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Secure Contract Intelligence" }]
license = { text = "Proprietary" }

dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "tenacity>=8.2",
    # Document processing
    "pdfplumber>=0.11",
    "pytesseract>=0.3.10",
    "opencv-python-headless>=4.9",
    "Pillow>=10.2",
    "pypdf>=4.2",
    "python-magic-bin>=0.4.14; platform_system == 'Windows'",
    "python-magic>=0.4.27; platform_system != 'Windows'",
    # Tiered table / layout extraction (CPU-only, no model downloads).
    # NOTE: camelot-py WITHOUT the [cv] extra — that extra pulls a second,
    # conflicting opencv-python; we reuse the opencv-python-headless above.
    # Needs the `ghostscript` system binary (installed in the API Dockerfile).
    "camelot-py>=0.11",
    "pymupdf>=1.24",  # bounding-box text extraction for multi-column reconstruction
    "img2table>=1.3",  # table detection on scanned-page images (OCR path)
    # Chunking / embeddings / vector store
    "langchain-text-splitters>=0.2",
    "chromadb>=0.5",
    "sentence-transformers>=2.7",
    # Lexical (keyword) retrieval for hybrid search — pure Python, depends only
    # on numpy (already required), so it adds no system/image weight.
    "rank-bm25>=0.2.2",
    # LLM providers (interfaces resolved at runtime via factory)
    "langchain-core>=0.2",
    "langchain-openai>=0.1",
    "langchain-anthropic>=0.1",
    "langchain-groq>=0.1",
    "langchain-google-genai>=1.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "types-Pillow",
    "reportlab>=4.0",  # programmatic PDF fixtures for parser tests
]

[tool.setuptools.packages.find]
where = ["."]
include = ["rag_core*"]

# NOTE: ruff / mypy / pytest configuration lives ONLY in the repository-root
# pyproject.toml so the monorepo has a single tooling authority. Keeping a
# competing [tool.ruff] here would shadow the root config for files under this
# package (ruff uses the nearest config), which silently dropped the root's
# per-file-ignores. This file intentionally carries packaging metadata only.
