# Local development / test stack.
# Build context is the repo root so both apps can copy the shared rag_core
# package. Run from repo root:  docker compose -f deploy/docker/docker-compose.yml up --build
services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: sci-api:dev
    env_file:
      - ../../.env
    environment:
      # Persist the vector index on a named volume (survives container rebuilds).
      CHROMA_PERSIST_DIR: /app/data/chroma
      LOG_DIR: /app/logs
      # Reliable file-watching across the Windows<->container boundary.
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      # Live source mounts: edit rag_core / api on the host and the server
      # reloads in-place — no image rebuild. Rebuild only when DEPS change.
      - ../../packages/rag_core:/app/packages/rag_core
      - ../../apps/api:/app/apps/api
      - chroma-data:/app/data/chroma
      - api-logs:/app/logs
    # Re-link rag_core to the mounted source (editable, deps already baked),
    # then run uvicorn watching both source trees.
    command: >
      sh -c "pip install -e /app/packages/rag_core --no-deps -q &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload
             --reload-dir /app/apps/api --reload-dir /app/packages/rag_core"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: sci-web:dev
    environment:
      # Server-side only — never exposed to the browser (see lib/server.ts).
      API_BASE_URL: http://api:8000
      API_KEY: ${API_KEY:-demo-key-tenant-acme}
      ACCESS_CODE: ${ACCESS_CODE:-change-me-locally}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  chroma-data:
  api-logs:
