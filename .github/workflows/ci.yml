name: CI

# Gates every PR and push to main. Runs the Python and Node toolchains in
# parallel jobs. Deployment is deliberately separate (see deploy.yml).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: System deps (tesseract, libmagic, OpenCV libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr libmagic1 libgl1 libglib2.0-0

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/rag_core[dev]"
          pip install -r apps/api/requirements.txt

      - name: Ruff (lint)
        run: ruff check packages/rag_core apps/api tests

      - name: Mypy (type-check)
        run: mypy packages/rag_core/rag_core apps/api

      - name: Pytest
        run: pytest -q

  node:
    name: Node (eslint · tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck
